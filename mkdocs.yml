site_name: survey-sim
site_description: High-performance survey simulation framework for transient astronomy
site_author: Michael Coughlin

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - toc.follow
  icon:
    repo: fontawesome/brands/github

nav:
  - Home: index.md
  - Getting Started:
    - Installation: getting-started/installation.md
    - Quick Start: getting-started/quickstart.md
  - Architecture:
    - Pipeline Overview: architecture/pipeline.md
    - Spatial Indexing: architecture/spatial.md
    - Lightcurve Models: architecture/lightcurves.md
    - Populations: architecture/populations.md
  - API Reference:
    - Python API: api/python.md
    - Rust Crate: api/rust.md
  - Examples:
    - Kilonovae: examples/kilonova.md
    - Type Ia Supernovae: examples/snia.md
    - Tidal Disruption Events: examples/tde.md
    - Fast Blue Optical Transients: examples/fbot.md
    - GRB Afterglows: examples/grb_afterglow.md
    - GW Event Coverage: examples/gw_coverage.md

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details

plugins:
  - search

extra_javascript:
  - javascripts/mathjax.js
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js
