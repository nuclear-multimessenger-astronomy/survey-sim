name: Argus Array
description: Argus Array — 1200-telescope array at UNC Chapel Hill

telescope:
  aperture_m: 8.0               # total effective aperture diameter
  location: ground
  latitude_deg: 35.9132         # UNC Chapel Hill (placeholder)
  longitude_deg: -79.0558
  altitude_m: 150

detector:
  plate_scale_arcsec: 1.0       # 1.0 arcsec/pixel
  read_noise_e: 1.4             # ultra-low-noise CMOS
  dark_current_e_per_s: 0.1     # estimated for cooled CMOS
  gain: 1.0                     # estimated
  fov_deg2: 8000.0              # 8,000 sq. deg per exposure

bands:
  b:
    central_wavelength_nm: 445   # midpoint of 365-525 nm
    width_nm: 160                # 525-365
    typical_seeing_arcsec: 2.0   # delivered image quality
    single_visit_depth: 20.5     # g-band 5-sigma, 1-min dark time (design goal)
    sky_brightness: 22.0         # estimated dark-sky
  r:
    central_wavelength_nm: 630   # midpoint of 560-700 nm
    width_nm: 140                # 700-560
    typical_seeing_arcsec: 2.0
    single_visit_depth: 20.0     # estimated from b-band scaling
    sky_brightness: 21.0         # estimated dark-sky

observing:
  default_exposure_s: 60.0       # 1-minute cadence (dark/gray time)
  readout_s: 0.001               # <1 ms dead time between exposures
  slew_rate_deg_per_s: 0.0       # fixed array, no slewing
  settle_s: 50.0                 # 50-second reset after 15-min tracking
  min_altitude_deg: 20.0
  max_airmass: 2.5
  min_moon_sep_deg: 15.0         # estimated

extinction_coefficients:
  b: 1.40                        # estimated for broad blue band
  r: 0.87                        # estimated for broad red band
