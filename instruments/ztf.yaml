name: ZTF
description: Zwicky Transient Facility

telescope:
  aperture_m: 1.22
  location: ground
  latitude_deg: 33.3564
  longitude_deg: -116.8650
  altitude_m: 1712

detector:
  plate_scale_arcsec: 1.01
  read_noise_e: 10.0
  dark_current_e_per_s: 0.1
  gain: 6.2
  fov_deg2: 47.0

bands:
  g:
    central_wavelength_nm: 472
    width_nm: 124
    typical_seeing_arcsec: 2.0
    single_visit_depth: 20.8
    sky_brightness: 22.0
  r:
    central_wavelength_nm: 634
    width_nm: 160
    typical_seeing_arcsec: 2.0
    single_visit_depth: 20.6
    sky_brightness: 21.0
  i:
    central_wavelength_nm: 782
    width_nm: 145
    typical_seeing_arcsec: 2.1
    single_visit_depth: 19.9
    sky_brightness: 20.3

observing:
  default_exposure_s: 30.0
  readout_s: 10.0
  slew_rate_deg_per_s: 2.5
  settle_s: 3.0
  min_altitude_deg: 20.0
  max_airmass: 2.5
  min_moon_sep_deg: 15.0

extinction_coefficients:
  g: 1.31
  r: 1.00
  i: 0.75
